<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Retracinator Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    background: #0a0c0f;
    color: #e0e8f0;
    min-height: 100vh;
    padding: 1.25rem;
  }

  .sb-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid #2a2f3a;
    padding-bottom: 0.9rem;
    flex-wrap: wrap;
    gap: 12px;
  }

  .sb-title {
    font-family: 'Orbitron', 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #00e5ff;
    text-transform: uppercase;
  }

  .sb-subtitle {
    font-size: 11px;
    color: #5a6478;
    letter-spacing: 2px;
    margin-top: 3px;
  }

  .controls-right {
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: flex-end;
  }

  .vol-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #5a6478;
    letter-spacing: 1px;
  }

  .vol-row input[type=range] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    border-radius: 2px;
    background: #2a2f3a;
    outline: none;
  }

  .vol-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #00e5ff;
    cursor: pointer;
  }

  .boost-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #5a6478;
    letter-spacing: 1px;
  }

  .boost-row input[type=range] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    border-radius: 2px;
    background: #2a2f3a;
    outline: none;
  }

  .boost-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ff3cac;
    cursor: pointer;
  }

  .vol-val { color: #00e5ff; min-width: 38px; font-size: 11px; text-align: right; }
  .boost-val { color: #ff3cac; min-width: 38px; font-size: 11px; text-align: right; }
  .boost-label { font-size: 9px; color: #ff3cac; letter-spacing: 1px; text-transform: uppercase; }

  .categories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }

  .cat-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border: 1px solid #2a2f3a;
    background: transparent;
    color: #5a6478;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .cat-btn:hover { border-color: #00e5ff; color: #00e5ff; }
  .cat-btn.active { border-color: #00e5ff; color: #00e5ff; background: rgba(0,229,255,0.08); }

  .add-cat-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border: 1px dashed #2a2f3a;
    background: transparent;
    color: #5a6478;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-cat-btn:hover { border-color: #ff3cac; color: #ff3cac; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .sound-btn {
    position: relative;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 14px 11px;
    background: #111318;
    border: 1px solid #2a2f3a;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.08s, box-shadow 0.15s;
    min-height: 85px;
    text-align: left;
    overflow: hidden;
    width: 100%;
    color: #e0e8f0;
  }

  .sound-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: #00e5ff;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .sound-btn:hover { background: #1a1f2a; border-color: #3a4050; }
  .sound-btn:hover::before { opacity: 0.4; }
  .sound-btn:active { transform: scale(0.96); }

  .sound-btn.playing {
    border-color: #00e5ff;
    box-shadow: 0 0 14px rgba(0,229,255,0.35), inset 0 0 20px rgba(0,229,255,0.05);
  }

  .sound-btn.playing::before { opacity: 1; }

  .sound-btn.has-file { border-left: 3px solid #ff3cac; }
  .sound-btn.has-file::before { background: #ff3cac; }
  .sound-btn.has-file.playing {
    border-color: #ff3cac;
    box-shadow: 0 0 14px rgba(255,60,172,0.35), inset 0 0 20px rgba(255,60,172,0.05);
  }

  .sound-btn.empty { opacity: 0.5; }

  .btn-name {
    font-size: 12px;
    color: #e0e8f0;
    line-height: 1.35;
    word-break: break-word;
    padding-right: 18px;
  }

  .btn-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-top: 10px;
  }

  .btn-cat-tag {
    font-size: 9px;
    letter-spacing: 1px;
    color: #5a6478;
    text-transform: uppercase;
  }

  .btn-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    border: 1px solid #2a2f3a;
    color: #5a6478;
    flex-shrink: 0;
  }

  .btn-delete {
    position: absolute;
    top: 5px; right: 6px;
    background: none;
    border: none;
    color: #3a4050;
    font-size: 12px;
    cursor: pointer;
    padding: 2px 4px;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1;
    transition: color 0.1s;
    display: none;
  }

  .sound-btn:hover .btn-delete { display: block; }
  .btn-delete:hover { color: #e24b4b !important; }

  .upload-zone {
    border: 1px dashed #2a2f3a;
    border-radius: 4px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;
  }

  .upload-header {
    font-size: 11px;
    color: #5a6478;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .upload-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .upload-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border: 1px solid #ff3cac;
    color: #ff3cac;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .upload-label:hover { background: rgba(255,60,172,0.1); }

  .text-input {
    font-family: 'Share Tech Mono', monospace;
    background: #111318;
    border: 1px solid #2a2f3a;
    color: #e0e8f0;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
  }

  .text-input:focus { border-color: #00e5ff; }

  .add-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border: 1px solid #00e5ff;
    color: #00e5ff;
    background: transparent;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .add-btn:hover { background: rgba(0,229,255,0.1); }
  .add-btn:disabled { opacity: 0.3; cursor: default; background: transparent; }

  .status-bar {
    font-size: 10px;
    color: #5a6478;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 0.5rem;
    border-top: 1px solid #1a1f2a;
  }

  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00e5ff;
    flex-shrink: 0;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .stop-all {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 12px;
    border: 1px solid rgba(226,75,75,0.35);
    color: #e24b4b;
    background: transparent;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    margin-left: auto;
  }

  .stop-all:hover { background: rgba(226,75,75,0.1); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }

  .modal {
    background: #111318;
    border: 1px solid #2a2f3a;
    border-radius: 6px;
    padding: 1.5rem;
    width: 280px;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: #00e5ff;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .modal input {
    font-family: 'Share Tech Mono', monospace;
    background: #0a0c0f;
    border: 1px solid #2a2f3a;
    color: #e0e8f0;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 2px;
    width: 100%;
    outline: none;
    margin-bottom: 12px;
  }

  .modal input:focus { border-color: #00e5ff; }

  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  .modal-btns button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid #2a2f3a;
    background: transparent;
    color: #5a6478;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .modal-btns button:hover { color: #e0e8f0; border-color: #5a6478; }
  .modal-btns .confirm { border-color: #00e5ff; color: #00e5ff; }
  .modal-btns .confirm:hover { background: rgba(0,229,255,0.1); }

  /* file info tag */
  .file-tag {
    font-size: 10px;
    color: #ff3cac;
    margin-top: 4px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
</style>
</head>
<body>

<div class="sb-header">
  <div>
    <div class="sb-title">The Retracinator</div>
    <div class="sb-subtitle">board v2.0 &nbsp;&#9632; offline</div>
  </div>
  <div class="controls-right">
    <div class="vol-row">
      VOL
      <input type="range" id="masterVol" min="0" max="100" value="80" />
      <span class="vol-val" id="volDisplay">80%</span>
    </div>
    <div class="boost-row">
      <span class="boost-label">BOOST</span>
      <input type="range" id="boostSlider" min="1" max="4" step="0.1" value="1" />
      <span class="boost-val" id="boostDisplay">1.0x</span>
    </div>
  </div>
</div>

<div class="categories" id="catRow"></div>
<div class="grid" id="soundGrid"></div>

<div class="upload-zone">
  <div class="upload-header">+ add sound</div>
  <div class="upload-row">
    <label class="upload-label">
      browse file
      <input type="file" id="fileInput" accept="audio/*" style="display:none" />
    </label>
    <div style="display:flex;flex-direction:column;gap:4px">
      <input class="text-input" id="nameInput" placeholder="sound name..." style="width:160px" />
      <div class="file-tag" id="fileTag"></div>
    </div>
    <select id="catSelect" class="text-input" style="width:120px"></select>
    <button class="add-btn" id="addBtn" disabled>add to board</button>
  </div>
</div>

<div class="status-bar">
  <div class="pulse" id="pulseDot" style="visibility:hidden"></div>
  <span id="statusText">ready</span>
  <button class="stop-all" id="stopAll">stop all</button>
</div>

<div id="modalContainer"></div>

<script>
  // ── Default layout (used only if nothing is saved yet) ──
  var DEFAULT_SOUNDS = [
    { id:1,  name:"portal open",  cat:"sfx",     data:null },
    { id:2,  name:"pickup item",  cat:"sfx",     data:null },
    { id:3,  name:"impact hit",   cat:"sfx",     data:null },
    { id:4,  name:"explosion",    cat:"sfx",     data:null },
    { id:5,  name:"footstep",     cat:"sfx",     data:null },
    { id:6,  name:"teleport",     cat:"sfx",     data:null },
    { id:7,  name:"ui click",     cat:"sfx",     data:null },
    { id:8,  name:"level up",     cat:"sfx",     data:null },
    { id:9,  name:"ambient loop", cat:"ambient", data:null },
    { id:10, name:"wind",         cat:"ambient", data:null },
    { id:11, name:"crowd noise",  cat:"ambient", data:null },
    { id:12, name:"static hum",   cat:"ambient", data:null },
  ];
  var DEFAULT_CATS = ["sfx","ambient","voice","custom"];

  // ── State ──
  var sounds = [];
  var categories = [];
  var nextId = 20;
  var activeAudios = {};
  var activeCategory = "all";
  var pendingFile = null; // { data: base64string, mime, name }
  var audioCtx = null;
  var saveTimer = null;

  // ── Persist helpers ──
  function saveState() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
      try {
        var payload = {
          sounds: sounds.map(function(s){ return { id:s.id, name:s.name, cat:s.cat, data:s.data, mime:s.mime||null }; }),
          categories: categories,
          nextId: nextId
        };
        localStorage.setItem('retracinator_v2', JSON.stringify(payload));
        flashSaved();
      } catch(e) {
        showStorageError();
      }
    }, 400);
  }

  function loadState() {
    try {
      var raw = localStorage.getItem('retracinator_v2');
      if (raw) {
        var payload = JSON.parse(raw);
        sounds = payload.sounds || DEFAULT_SOUNDS;
        categories = payload.categories || DEFAULT_CATS;
        nextId = payload.nextId || 20;
        return;
      }
    } catch(e) {}
    sounds = JSON.parse(JSON.stringify(DEFAULT_SOUNDS));
    categories = DEFAULT_CATS.slice();
  }

  function flashSaved() {
    var st = document.getElementById('statusText');
    var prev = st.textContent;
    if (prev.indexOf('saved') !== -1) return;
    st.style.color = '#00e5ff';
    st.textContent = 'saved';
    setTimeout(function(){ st.style.color = ''; updateStatus(); }, 1200);
  }

  function showStorageError() {
    var st = document.getElementById('statusText');
    st.style.color = '#e24b4b';
    st.textContent = 'storage full — delete some sounds';
    setTimeout(function(){ st.style.color = ''; updateStatus(); }, 3000);
  }

  // ── Audio ──
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function getVol() { return parseInt(document.getElementById('masterVol').value) / 100; }
  function getBoost() { return parseFloat(document.getElementById('boostSlider').value); }

  function dataToUrl(s) {
    if (!s.data) return null;
    try {
      var mime = s.mime || 'audio/mpeg';
      var bin = atob(s.data);
      var arr = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      var blob = new Blob([arr], { type: mime });
      return URL.createObjectURL(blob);
    } catch(e) { return null; }
  }

  function playSound(s) {
    if (activeAudios[s.id]) {
      try { activeAudios[s.id].source.stop(); } catch(e){}
      delete activeAudios[s.id];
      updateStatus(); renderGrid(); return;
    }
    if (!s.data) return;
    var ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    var url = dataToUrl(s);
    if (!url) return;
    fetch(url)
      .then(function(r){ return r.arrayBuffer(); })
      .then(function(buf){ return ctx.decodeAudioData(buf); })
      .then(function(decoded){
        var source = ctx.createBufferSource();
        source.buffer = decoded;
        var vol = ctx.createGain();
        vol.gain.value = getVol() * getBoost();
        source.connect(vol);
        vol.connect(ctx.destination);
        source.start(0);
        activeAudios[s.id] = { source: source, volNode: vol };
        source.onended = function(){ delete activeAudios[s.id]; updateStatus(); renderGrid(); };
        updateStatus(); renderGrid();
      }).catch(function(err){ console.warn('Audio error:', err); });
  }

  function updateAllVolumes() {
    var v = getVol() * getBoost();
    Object.values(activeAudios).forEach(function(a){ if(a.volNode) a.volNode.gain.value = v; });
  }

  document.getElementById('masterVol').oninput = function() {
    document.getElementById('volDisplay').textContent = this.value + '%';
    updateAllVolumes();
  };

  document.getElementById('boostSlider').oninput = function() {
    document.getElementById('boostDisplay').textContent = parseFloat(this.value).toFixed(1) + 'x';
    updateAllVolumes();
  };

  // ── Render ──
  function updateCatSelect() {
    var sel = document.getElementById('catSelect');
    sel.innerHTML = '';
    categories.forEach(function(c){
      var o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }

  function renderCats() {
    var catRow = document.getElementById('catRow');
    catRow.innerHTML = '';
    var allB = document.createElement('button');
    allB.className = 'cat-btn' + (activeCategory==='all' ? ' active' : '');
    allB.textContent = 'ALL';
    allB.onclick = function(){ activeCategory='all'; renderCats(); renderGrid(); };
    catRow.appendChild(allB);
    categories.forEach(function(c){
      var b = document.createElement('button');
      b.className = 'cat-btn' + (activeCategory===c ? ' active' : '');
      b.textContent = c.toUpperCase();
      b.onclick = function(){ activeCategory=c; renderCats(); renderGrid(); };
      catRow.appendChild(b);
    });
    var addC = document.createElement('button');
    addC.className = 'add-cat-btn';
    addC.textContent = '+ category';
    addC.onclick = showAddCatModal;
    catRow.appendChild(addC);
    updateCatSelect();
  }

  function renderGrid() {
    var grid = document.getElementById('soundGrid');
    grid.innerHTML = '';
    var filtered = activeCategory==='all' ? sounds : sounds.filter(function(s){ return s.cat===activeCategory; });
    filtered.forEach(function(s){
      var btn = document.createElement('button');
      btn.className = 'sound-btn' + (s.data ? ' has-file' : ' empty') + (activeAudios[s.id] ? ' playing' : '');

      var del = document.createElement('button');
      del.className = 'btn-delete';
      del.textContent = 'x';
      del.title = 'remove';
      del.onclick = function(e){ e.stopPropagation(); removeSound(s.id); };

      var name = document.createElement('span');
      name.className = 'btn-name';
      name.textContent = s.name;

      var bottom = document.createElement('div');
      bottom.className = 'btn-bottom';

      var tag = document.createElement('span');
      tag.className = 'btn-cat-tag';
      tag.textContent = s.cat;

      var icon = document.createElement('div');
      icon.className = 'btn-icon';
      icon.innerHTML = s.data ? '&#9654;' : '+';

      bottom.appendChild(tag);
      bottom.appendChild(icon);
      btn.appendChild(del);
      btn.appendChild(name);
      btn.appendChild(bottom);
      btn.onclick = function(){ handleClick(s); };
      grid.appendChild(btn);
    });
  }

  function handleClick(s) {
    if (!s.data) {
      document.getElementById('fileInput').setAttribute('data-target', s.id);
      document.getElementById('nameInput').value = s.name;
      document.getElementById('catSelect').value = s.cat;
      document.getElementById('fileInput').click();
      return;
    }
    playSound(s);
  }

  function removeSound(id) {
    if (activeAudios[id]) { try { activeAudios[id].source.stop(); } catch(e){} delete activeAudios[id]; }
    sounds = sounds.filter(function(s){ return s.id !== id; });
    saveState(); updateStatus(); renderGrid();
  }

  function updateStatus() {
    var count = Object.keys(activeAudios).length;
    var st = document.getElementById('statusText');
    if (st.textContent === 'saved') return;
    st.textContent = count > 0 ? ('playing ' + count + ' sound' + (count>1?'s':'')) : 'ready';
    document.getElementById('pulseDot').style.visibility = count > 0 ? 'visible' : 'hidden';
  }

  // ── File reading → base64 ──
  function readFileAsBase64(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var dataUrl = e.target.result;
      var base64 = dataUrl.split(',')[1];
      callback(base64, file.type);
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('fileInput').onchange = function() {
    var file = this.files[0];
    if (!file) return;
    var targetId = this.getAttribute('data-target');
    var cleanName = file.name.replace(/\.[^.]+$/, '');
    var labelName = document.getElementById('nameInput').value || cleanName;

    readFileAsBase64(file, function(base64, mime) {
      if (targetId) {
        var s = sounds.find(function(x){ return x.id == targetId; });
        if (s) { s.data = base64; s.mime = mime; s.name = labelName; }
        document.getElementById('fileInput').removeAttribute('data-target');
        document.getElementById('fileTag').textContent = '';
        saveState();
        renderGrid();
      } else {
        pendingFile = { data: base64, mime: mime, name: cleanName };
        document.getElementById('nameInput').value = cleanName;
        document.getElementById('fileTag').textContent = file.name;
        document.getElementById('addBtn').disabled = false;
      }
    });

    this.value = '';
  };

  document.getElementById('nameInput').oninput = function() {
    if (pendingFile) document.getElementById('addBtn').disabled = this.value.trim() === '';
  };

  document.getElementById('addBtn').onclick = function() {
    if (!pendingFile) return;
    var name = document.getElementById('nameInput').value.trim() || 'new sound';
    var cat = document.getElementById('catSelect').value;
    sounds.push({ id: nextId++, name: name, cat: cat, data: pendingFile.data, mime: pendingFile.mime });
    pendingFile = null;
    document.getElementById('nameInput').value = '';
    document.getElementById('fileTag').textContent = '';
    document.getElementById('addBtn').disabled = true;
    saveState(); renderCats(); renderGrid();
  };

  document.getElementById('stopAll').onclick = function() {
    Object.values(activeAudios).forEach(function(a){ try { a.source.stop(); } catch(e){} });
    activeAudios = {};
    updateStatus(); renderGrid();
  };

  function showAddCatModal() {
    var bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = '<div class="modal"><div class="modal-title">New Category</div><input id="newCatInput" placeholder="category name..." maxlength="20" /><div class="modal-btns"><button id="cancelCat">cancel</button><button class="confirm" id="confirmCat">add</button></div></div>';
    document.getElementById('modalContainer').appendChild(bg);
    var input = bg.querySelector('#newCatInput');
    input.focus();
    bg.querySelector('#cancelCat').onclick = function(){ bg.remove(); };
    bg.querySelector('#confirmCat').onclick = function(){
      var val = input.value.trim().toLowerCase();
      if (val && categories.indexOf(val) === -1) { categories.push(val); saveState(); renderCats(); }
      bg.remove();
    };
    input.onkeydown = function(e){
      if (e.key==='Enter') bg.querySelector('#confirmCat').click();
      if (e.key==='Escape') bg.remove();
    };
  }

  // ── Boot ──
  loadState();
  renderCats();
  renderGrid();
</script>
</body>
</html>
